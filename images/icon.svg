<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#1565C0"/>
  <!-- Truck outline -->
  <rect x="6" y="18" width="24" height="16" rx="2" fill="white" opacity="0.9"/>
  <rect x="30" y="22" width="12" height="12" rx="2" fill="white" opacity="0.9"/>
  <!-- Wheels -->
  <circle cx="12" cy="35" r="4" fill="#1565C0" stroke="white" stroke-width="2"/>
  <circle cx="24" cy="35" r="4" fill="#1565C0" stroke="white" stroke-width="2"/>
  <circle cx="37" cy="35" r="4" fill="#1565C0" stroke="white" stroke-width="2"/>
  <!-- Windshield -->
  <rect x="31" y="23" width="10" height="6" rx="1" fill="#90CAF9"/>
  <!-- Bar chart lines (analytics) -->
  <rect x="9"  y="21" width="3" height="10" rx="1" fill="#1565C0"/>
  <rect x="14" y="24" width="3" height="7"  rx="1" fill="#1565C0"/>
  <rect x="19" y="22" width="3" height="9"  rx="1" fill="#1565C0"/>
  <!-- Top accent line -->
  <rect x="6" y="10" width="36" height="3" rx="1.5" fill="#FF6F00"/>
</svg>
