<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynalytix</title>
  <link rel="stylesheet" href="styles/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="dyn-app">

  <!-- SIDEBAR NAVIGATION -->
  <aside class="dyn-sidebar" id="dyn-sidebar">
    <div class="dyn-sidebar-logo">
      <img src="images/icon.svg" alt="Logo" class="dyn-logo-img" />
      <span class="dyn-logo-text">Dynalytix</span>
      <button class="dyn-pin-btn" id="dyn-pin-btn" title="Pin sidebar">📌</button>
    </div>
    <nav class="dyn-sidebar-nav">
      <a class="dyn-nav-item" data-page="homepage" href="#">
        <span class="dyn-nav-icon">🏠</span>
        <span class="dyn-nav-label">Homepage</span>
      </a>
      <a class="dyn-nav-item" data-page="leaderboard" href="#">
        <span class="dyn-nav-icon">📊</span>
        <span class="dyn-nav-label">Leaderboard</span>
      </a>
      <div class="dyn-nav-section">DASHBOARDS</div>
      <a class="dyn-nav-item" data-page="scored-events" href="#">
        <span class="dyn-nav-icon">⚡</span>
        <span class="dyn-nav-label">Scored Events</span>
      </a>
      <a class="dyn-nav-item" data-page="scored-events-vehicle" href="#">
        <span class="dyn-nav-icon">🚗</span>
        <span class="dyn-nav-label">Scored Events — Vehicle</span>
      </a>
      <div class="dyn-nav-section">REPORTS</div>
      <a class="dyn-nav-item" data-page="scorecard" href="#">
        <span class="dyn-nav-icon">📋</span>
        <span class="dyn-nav-label">Scorecard</span>
      </a>
      <a class="dyn-nav-item" data-page="pm" href="#">
        <span class="dyn-nav-icon">🔧</span>
        <span class="dyn-nav-label">Preventative Maintenance</span>
      </a>
      <a class="dyn-nav-item" data-page="compliance" href="#">
        <span class="dyn-nav-icon">📅</span>
        <span class="dyn-nav-label">Compliance &amp; Utilization</span>
      </a>
      <a class="dyn-nav-item" data-page="coaching" href="#">
        <span class="dyn-nav-icon">🎓</span>
        <span class="dyn-nav-label">Coaching &amp; Engagement</span>
      </a>
    </nav>
    <div class="dyn-sidebar-footer">
      <a class="dyn-nav-item" href="#">
        <span class="dyn-nav-icon">⚙️</span>
        <span class="dyn-nav-label">Settings</span>
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="dyn-main">
    <header class="dyn-topbar">
      <div class="dyn-topbar-title" id="page-title">Dynalytix</div>
      <div class="dyn-topbar-controls">
        <div class="dyn-date-display" id="date-range-display"></div>
        <select class="dyn-period-select" id="period-selector">
          <option value="7days">Last 7 days</option>
          <option value="14days">Last 14 days</option>
          <option value="30days" selected>Last 30 days</option>
          <option value="90days">Last 90 days</option>
        </select>
        <button class="dyn-btn-export" id="btn-export" title="Export CSV">⬆️</button>
      </div>
    </header>
    <div class="dyn-page-container" id="page-container">
      <div class="dyn-loading" id="loading">
        <div class="dyn-spinner"></div>
        <p>Loading data...</p>
      </div>
    </div>
  </main>

</div><!-- #dyn-app -->

<script src="src/utils.js"></script>
<script src="src/api.js"></script>
<script src="src/pages/homepage.js"></script>
<script src="src/pages/leaderboard.js"></script>
<script src="src/pages/scored-events.js"></script>
<script src="src/pages/scorecard.js"></script>
<script src="src/pages/preventative-maintenance.js"></script>
<script src="src/pages/compliance-utilization.js"></script>
<script src="src/pages/coaching-engagement.js"></script>
<script src="src/sidebar.js"></script>
<script src="src/app.js"></script>

</body>
</html>
